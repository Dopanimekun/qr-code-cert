<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#0a0a0f" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="QR Verifier" />
    <title>QR Verifier</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    <!-- Chaves compartilhadas (TrustStore) -->
    <script src="keys.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Outfit:wght@300;400;600;700&display=swap");
      :root {
        --bg: #0a0a0f;
        --surface: #111118;
        --border: #1e1e2e;
        --accent: #7c3aed;
        --accent2: #06b6d4;
        --valid: #10b981;
        --invalid: #ef4444;
        --warn: #f59e0b;
        --text: #e2e8f0;
        --muted: #64748b;
        --mono: "Share Tech Mono", monospace;
        --sans: "Outfit", sans-serif;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: var(--sans);
        overflow: hidden;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(124, 58, 237, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(124, 58, 237, 0.04) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
        z-index: 0;
      }
      #app {
        position: relative;
        z-index: 1;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
      }
      header {
        width: 100%;
        padding: 20px 24px 16px;
        display: flex;
        align-items: center;
        gap: 12px;
        border-bottom: 1px solid var(--border);
      }
      .logo-mark {
        width: 36px;
        height: 36px;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        flex-shrink: 0;
      }
      .logo-text {
        display: flex;
        flex-direction: column;
      }
      .logo-title {
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0.03em;
        line-height: 1;
      }
      .logo-sub {
        font-size: 10px;
        color: var(--muted);
        font-family: var(--mono);
        letter-spacing: 0.08em;
        margin-top: 2px;
      }
      .status-dot {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        color: var(--muted);
        font-family: var(--mono);
      }
      .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--valid);
        box-shadow: 0 0 8px var(--valid);
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }
      #scanner-screen {
        flex: 1;
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        gap: 24px;
      }
      .scanner-wrapper {
        position: relative;
        width: 100%;
        max-width: 320px;
      }
      #video {
        width: 100%;
        aspect-ratio: 1;
        object-fit: cover;
        border-radius: 16px;
        display: block;
        background: #000;
      }
      .scanner-overlay {
        position: absolute;
        inset: 0;
        border-radius: 16px;
        pointer-events: none;
      }
      .scanner-overlay::before,
      .scanner-overlay::after {
        content: "";
        position: absolute;
        width: 32px;
        height: 32px;
        border-color: var(--accent);
        border-style: solid;
      }
      .scanner-overlay::before {
        top: 12px;
        left: 12px;
        border-width: 3px 0 0 3px;
        border-radius: 4px 0 0 0;
      }
      .scanner-overlay::after {
        bottom: 12px;
        right: 12px;
        border-width: 0 3px 3px 0;
        border-radius: 0 0 4px 0;
      }
      .corner-br {
        position: absolute;
        top: 12px;
        right: 12px;
        width: 32px;
        height: 32px;
        border-top: 3px solid var(--accent);
        border-right: 3px solid var(--accent);
        border-radius: 0 4px 0 0;
      }
      .corner-bl {
        position: absolute;
        bottom: 12px;
        left: 12px;
        width: 32px;
        height: 32px;
        border-bottom: 3px solid var(--accent);
        border-left: 3px solid var(--accent);
        border-radius: 0 0 0 4px;
      }
      .scan-line {
        position: absolute;
        left: 16px;
        right: 16px;
        height: 2px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--accent),
          transparent
        );
        border-radius: 2px;
        top: 16px;
        animation: scanMove 2.5s ease-in-out infinite;
      }
      @keyframes scanMove {
        0% {
          top: 16px;
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        90% {
          opacity: 1;
        }
        100% {
          top: calc(100% - 16px);
          opacity: 0;
        }
      }
      .hint-text {
        font-size: 13px;
        color: var(--muted);
        text-align: center;
        font-family: var(--mono);
        letter-spacing: 0.05em;
      }
      #result-screen {
        flex: 1;
        width: 100%;
        display: none;
        flex-direction: column;
        align-items: center;
        padding: 24px;
        gap: 16px;
        overflow-y: auto;
      }
      .result-icon {
        font-size: 64px;
        line-height: 1;
        margin-top: 8px;
        animation: iconPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      @keyframes iconPop {
        from {
          transform: scale(0);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }
      .result-title {
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 0.02em;
        text-align: center;
      }
      .result-card {
        width: 100%;
        max-width: 380px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .result-card.valid {
        border-color: rgba(16, 185, 129, 0.3);
        background: rgba(16, 185, 129, 0.05);
      }
      .result-card.invalid {
        border-color: rgba(239, 68, 68, 0.3);
        background: rgba(239, 68, 68, 0.05);
      }
      .result-card.warn {
        border-color: rgba(245, 158, 11, 0.3);
        background: rgba(245, 158, 11, 0.05);
      }
      .info-row {
        display: flex;
        flex-direction: column;
        gap: 3px;
      }
      .info-label {
        font-size: 10px;
        font-family: var(--mono);
        letter-spacing: 0.1em;
        color: var(--muted);
        text-transform: uppercase;
      }
      .info-value {
        font-size: 14px;
        font-weight: 500;
        word-break: break-all;
      }
      .info-value.mono {
        font-family: var(--mono);
        font-size: 12px;
        color: var(--accent2);
      }
      .role-card {
        width: 100%;
        max-width: 380px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 20px;
      }
      .role-header {
        font-size: 10px;
        font-family: var(--mono);
        letter-spacing: 0.1em;
        color: var(--muted);
        text-transform: uppercase;
        margin-bottom: 10px;
      }
      .role-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 16px;
        border-radius: 99px;
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 8px;
      }
      .role-badge.admin {
        background: rgba(124, 58, 237, 0.2);
        color: #a78bfa;
        border: 1px solid rgba(124, 58, 237, 0.4);
      }
      .role-badge.financeiro {
        background: rgba(16, 185, 129, 0.2);
        color: #34d399;
        border: 1px solid rgba(16, 185, 129, 0.4);
      }
      .role-badge.visitante {
        background: rgba(245, 158, 11, 0.2);
        color: #fbbf24;
        border: 1px solid rgba(245, 158, 11, 0.4);
      }
      .role-desc {
        font-size: 13px;
        color: var(--muted);
      }
      .btn-scan {
        width: 100%;
        max-width: 380px;
        padding: 16px;
        background: linear-gradient(135deg, var(--accent), #5b21b6);
        color: #fff;
        border: none;
        border-radius: 14px;
        font-size: 15px;
        font-weight: 600;
        font-family: var(--sans);
        cursor: pointer;
        letter-spacing: 0.02em;
        transition:
          opacity 0.2s,
          transform 0.1s;
        margin-top: 4px;
      }
      .btn-scan:active {
        transform: scale(0.98);
        opacity: 0.9;
      }

      #history-screen {
        flex: 1;
        width: 100%;
        display: none;
        flex-direction: column;
        padding: 16px 24px;
        gap: 0;
        overflow-y: auto;
      }
      .history-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 0 16px;
      }
      .history-title {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.05em;
        color: var(--text);
        font-family: var(--mono);
      }
      .history-clear {
        font-size: 11px;
        color: var(--muted);
        font-family: var(--mono);
        background: none;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 4px 10px;
        cursor: pointer;
        color: var(--muted);
        transition: color 0.2s, border-color 0.2s;
      }
      .history-clear:hover {
        color: var(--invalid);
        border-color: var(--invalid);
      }
      .history-empty {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
        color: var(--muted);
        font-family: var(--mono);
        font-size: 12px;
        letter-spacing: 0.05em;
        padding-bottom: 40px;
      }
      .history-empty-icon {
        font-size: 32px;
        opacity: 0.4;
      }
      .history-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 0;
        border-bottom: 1px solid var(--border);
        cursor: pointer;
        transition: background 0.15s;
        border-radius: 4px;
      }
      .history-item:hover {
        background: rgba(255,255,255,0.03);
      }
      .history-item:last-child {
        border-bottom: none;
      }
      .history-badge {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        flex-shrink: 0;
      }
      .history-badge.valid   { background: rgba(16,185,129,0.15); }
      .history-badge.invalid { background: rgba(239,68,68,0.15); }
      .history-badge.warn    { background: rgba(245,158,11,0.15); }
      .history-info {
        flex: 1;
        min-width: 0;
      }
      .history-status {
        font-size: 12px;
        font-weight: 600;
        font-family: var(--mono);
        letter-spacing: 0.03em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .history-status.valid   { color: var(--valid); }
      .history-status.invalid { color: var(--invalid); }
      .history-status.warn    { color: var(--warn); }
      .history-detail {
        font-size: 11px;
        color: var(--muted);
        font-family: var(--mono);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-top: 2px;
      }
      .history-time {
        font-size: 10px;
        color: var(--muted);
        font-family: var(--mono);
        flex-shrink: 0;
      }
      /* tab bar */
      .tab-bar {
        width: 100%;
        display: flex;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
      }
      .tab-btn {
        flex: 1;
        padding: 10px;
        background: none;
        border: none;
        border-bottom: 2px solid transparent;
        color: var(--muted);
        font-family: var(--mono);
        font-size: 11px;
        letter-spacing: 0.05em;
        cursor: pointer;
        transition: color 0.2s, border-color 0.2s;
      }
      .tab-btn.active {
        color: var(--accent);
        border-bottom-color: var(--accent);
      }
      .tab-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: var(--accent);
        color: #fff;
        font-size: 9px;
        margin-left: 5px;
        vertical-align: middle;
      }

      #perm-screen {
        flex: 1;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 32px;
        gap: 16px;
        text-align: center;
      }
      #perm-screen .icon {
        font-size: 48px;
      }
      #perm-screen p {
        color: var(--muted);
        font-size: 14px;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <div class="logo-mark">🔐</div>
        <div class="logo-text">
          <span class="logo-title">QR Verifier</span>
          <span class="logo-sub">ECDSA P-256 · ECC</span>
        </div>
        <div class="status-dot">
          <span class="dot"></span><span>ONLINE</span>
        </div>
      </header>

      <!-- Tab bar (aparece só quando há histórico) -->
      <div class="tab-bar" id="tab-bar" style="display:none">
        <button class="tab-btn active" id="tab-scan" onclick="showTab('scan')">SCANNER</button>
        <button class="tab-btn" id="tab-hist" onclick="showTab('history')">HISTÓRICO <span class="tab-badge" id="hist-count">0</span></button>
      </div>

      <div id="scanner-screen">
        <div class="scanner-wrapper">
          <video id="video" autoplay playsinline muted></video>
          <div class="scanner-overlay">
            <div class="corner-br"></div>
            <div class="corner-bl"></div>
            <div class="scan-line"></div>
          </div>
        </div>
        <p class="hint-text">Aponte para um QR Code ECC assinado</p>
      </div>

      <div id="result-screen">
        <div class="result-icon" id="result-icon"></div>
        <div class="result-title" id="result-title"></div>
        <div class="result-card" id="result-card">
          <div class="info-row" id="row-emissor" style="display: none">
            <span class="info-label">Emissor</span>
            <span class="info-value" id="val-emissor"></span>
          </div>
          <div class="info-row" id="row-dado" style="display: none">
            <span class="info-label">Dado verificado</span>
            <span class="info-value mono" id="val-dado"></span>
          </div>
          <div class="info-row" id="row-msg" style="display: none">
            <span class="info-label">Detalhe</span>
            <span class="info-value" id="val-msg"></span>
          </div>
        </div>
        <div class="role-card" id="role-card" style="display: none">
          <div class="role-header">Nível de Acesso</div>
          <div class="role-badge" id="role-badge"></div>
          <div class="role-desc" id="role-desc"></div>
        </div>
        <button class="btn-scan" onclick="resetScanner()">
          ↩ Escanear outro QR
        </button>
      </div>

      <div id="history-screen">
        <div class="history-header">
          <span class="history-title">// SCANS DA SESSÃO</span>
          <button class="history-clear" onclick="clearHistory()">LIMPAR</button>
        </div>
        <div id="history-list">
          <div class="history-empty">
            <div class="history-empty-icon">📋</div>
            <span>Nenhum scan realizado</span>
          </div>
        </div>
      </div>

      <div id="perm-screen">
        <div class="icon">📷</div>
        <div class="result-title">Permissão de câmera necessária</div>
        <p>
          Acesse as configurações do navegador e permita o acesso à câmera para
          este site.
        </p>
      </div>
    </div>

    <script>
      // TRUST_STORE é carregado de keys.js via <script src="keys.js">

      function hexToBytes(hex) {
        const bytes = new Uint8Array(hex.length / 2);
        for (let i = 0; i < hex.length; i += 2)
          bytes[i / 2] = parseInt(hex.substring(i, i + 2), 16);
        return bytes;
      }

      // Converte assinatura DER (jsrsasign) para Raw r||s (Web Crypto API)
      // DER: 30 XX 02 XX [r...] 02 XX [s...]  →  Raw: [r 32B][s 32B]
      function derToRaw(sigHex) {
        const b = hexToBytes(sigHex);
        let offset = 2; // pula 0x30 e totalLen

        offset++; // pula tag 0x02
        let rLen = b[offset++];
        let rStart = offset;
        if (b[rStart] === 0x00) {
          rStart++;
          rLen--;
        } // remove padding DER
        const r = b.slice(rStart, rStart + rLen);
        offset = rStart + rLen;

        offset++; // pula tag 0x02
        let sLen = b[offset++];
        let sStart = offset;
        if (b[sStart] === 0x00) {
          sStart++;
          sLen--;
        } // remove padding DER
        const s = b.slice(sStart, sStart + sLen);

        const raw = new Uint8Array(64);
        raw.set(r, 32 - r.length); // zero-padding à esquerda se r < 32B
        raw.set(s, 64 - s.length); // zero-padding à esquerda se s < 32B
        return raw;
      }

      async function importPublicKey(pubHex) {
        const raw = hexToBytes(pubHex);
        return crypto.subtle.importKey(
          "raw",
          raw,
          { name: "ECDSA", namedCurve: "P-256" },
          false,
          ["verify"],
        );
      }

      async function verifySignature(pubHex, data, sigHex) {
        const key = await importPublicKey(pubHex);
        const sigBytes = derToRaw(sigHex); // converte DER → Raw antes de verificar
        const dataBytes = new TextEncoder().encode(data);
        return crypto.subtle.verify(
          { name: "ECDSA", hash: "SHA-256" },
          key,
          sigBytes,
          dataBytes,
        );
      }

      async function verifyPayload(raw) {
        // A assinatura hex nunca contém "|", então fatia pelo primeiro e último "|"
        // Isso permite que o campo DADO contenha "|" sem quebrar o parse
        const firstPipe = raw.indexOf("|");
        const lastPipe  = raw.lastIndexOf("|");
        if (firstPipe === -1 || firstPipe === lastPipe) return { status: "malformed" };

        const certId = raw.slice(0, firstPipe);
        const data   = raw.slice(firstPipe + 1, lastPipe);
        const sigHex = raw.slice(lastPipe + 1);

        if (!certId || !data || !sigHex) return { status: "malformed" };
        const entry = TRUST_STORE[certId];
        if (!entry) return { status: "unknown", certId };

        try {
          const valid = await verifySignature(entry.pub, data, sigHex);
          if (valid) return { status: "valid", certId, data, entry };
          return { status: "invalid", certId, data };
        } catch (e) {
          console.error("Erro na verificação:", e);
          return { status: "invalid", certId, data };
        }
      }

      function showResult(result) {
        document.getElementById("scanner-screen").style.display = "none";
        const rs = document.getElementById("result-screen");
        rs.style.display = "flex";

        const icon = document.getElementById("result-icon");
        const title = document.getElementById("result-title");
        const card = document.getElementById("result-card");
        const roleCard = document.getElementById("role-card");

        card.className = "result-card";
        roleCard.style.display = "none";
        document.getElementById("row-emissor").style.display = "none";
        document.getElementById("row-dado").style.display = "none";
        document.getElementById("row-msg").style.display = "none";

        if (result.status === "valid") {
          icon.textContent = "✅";
          title.textContent = "ACESSO AUTORIZADO";
          title.style.color = "var(--valid)";
          card.classList.add("valid");
          document.getElementById("row-emissor").style.display = "";
          document.getElementById("val-emissor").textContent =
            `${result.entry.name} (ID: ${result.certId})`;
          document.getElementById("row-dado").style.display = "";
          document.getElementById("val-dado").textContent = result.data;
          roleCard.style.display = "";
          const badge = document.getElementById("role-badge");
          badge.className = `role-badge ${result.entry.role}`;
          badge.textContent = result.entry.roleLabel;
          document.getElementById("role-desc").textContent =
            result.entry.roleDesc;
        } else if (result.status === "invalid") {
          icon.textContent = "❌";
          title.textContent = "ASSINATURA INVÁLIDA";
          title.style.color = "var(--invalid)";
          card.classList.add("invalid");
          document.getElementById("row-emissor").style.display = "";
          document.getElementById("val-emissor").textContent =
            `ID: ${result.certId}`;
          document.getElementById("row-dado").style.display = "";
          document.getElementById("val-dado").textContent = result.data;
          document.getElementById("row-msg").style.display = "";
          document.getElementById("val-msg").textContent =
            "O dado pode ter sido adulterado ou a chave é inválida.";
        } else if (result.status === "unknown") {
          icon.textContent = "⚠️";
          title.textContent = "EMISSOR DESCONHECIDO";
          title.style.color = "var(--warn)";
          card.classList.add("warn");
          document.getElementById("row-msg").style.display = "";
          document.getElementById("val-msg").textContent =
            `ID '${result.certId}' não está no TrustStore.`;
        } else {
          icon.textContent = "⚠️";
          title.textContent = "QR INVÁLIDO";
          title.style.color = "var(--warn)";
          card.classList.add("warn");
          document.getElementById("row-msg").style.display = "";
          document.getElementById("val-msg").textContent =
            "Formato não reconhecido — não é um QR ECC assinado.";
        }

        addToHistory(result);
      }

      function resetScanner() {
        document.getElementById("result-screen").style.display = "none";
        document.getElementById("scanner-screen").style.display = "flex";
        lastScanned = "";
        startScanner();
      }

      // Canvas oculto usado para extrair frames do vídeo
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d", { willReadFrequently: true });

      let activeStream = null;
      let scanLoopId = null;
      let lastScanned = "";
      let scanning = false;

      async function startScanner() {
        const video = document.getElementById("video");
        lastScanned = "";
        scanning = true;

        // Para stream anterior se existir
        if (activeStream) {
          activeStream.getTracks().forEach((t) => t.stop());
          activeStream = null;
        }

        try {
          // Solicita câmera traseira — no iPhone isso abre a câmera correta
          const stream = await navigator.mediaDevices.getUserMedia({
            video: {
              facingMode: { ideal: "environment" },
              width: { ideal: 1280 },
              height: { ideal: 720 },
            },
            audio: false,
          });

          activeStream = stream;
          video.srcObject = stream;

          // No Safari/iOS é obrigatório .play() explícito após srcObject
          await video.play();

          // Aguarda o vídeo ter dimensões reais antes de começar a ler frames
          await new Promise((resolve) => {
            if (video.readyState >= 2) return resolve();
            video.addEventListener("canplay", resolve, { once: true });
          });

          scanLoop(video);
        } catch (e) {
          console.error("Erro ao acessar câmera:", e);
          document.getElementById("scanner-screen").style.display = "none";
          document.getElementById("perm-screen").style.display = "flex";
        }
      }

      function scanLoop(video) {
        if (!scanning) return;

        const w = video.videoWidth;
        const h = video.videoHeight;

        if (w > 0 && h > 0) {
          canvas.width = w;
          canvas.height = h;
          ctx.drawImage(video, 0, 0, w, h);
          const imageData = ctx.getImageData(0, 0, w, h);

          const code = jsQR(imageData.data, w, h, {
            inversionAttempts: "dontInvert",
          });

          if (code && code.data && code.data !== lastScanned) {
            lastScanned = code.data;
            scanning = false;

            // Para a câmera ao detectar
            if (activeStream) {
              activeStream.getTracks().forEach((t) => t.stop());
              activeStream = null;
            }

            verifyPayload(code.data).then(showResult);
            return;
          }
        }

        // Agenda próxima leitura (~15fps — suficiente e leve no iPhone)
        scanLoopId = setTimeout(() => scanLoop(video), 66);
      }

      function resetScanner() {
        if (scanLoopId) {
          clearTimeout(scanLoopId);
          scanLoopId = null;
        }
        document.getElementById("result-screen").style.display = "none";
        document.getElementById("scanner-screen").style.display = "flex";
        startScanner();
      }

      // Fallback manual (caso raro de browser muito antigo sem getUserMedia)
      function showManualFallback() {
        const hint = document.querySelector(".hint-text");
        hint.innerHTML = `
          Cole o payload do QR abaixo para verificar manualmente:<br><br>
          <input id="manual-input" placeholder="01|DADO|SIG"
            style="width:100%;padding:10px;background:#111;border:1px solid #333;
                   border-radius:8px;color:#fff;font-family:monospace;font-size:12px;margin-top:8px">
          <button onclick="manualVerify()"
            style="margin-top:8px;width:100%;padding:10px;background:var(--accent);
                   border:none;border-radius:8px;color:#fff;font-weight:600;cursor:pointer">
            Verificar
          </button>`;
      }

      async function manualVerify() {
        const val = document.getElementById("manual-input")?.value?.trim();
        if (!val) return;
        lastScanned = val;
        const r = await verifyPayload(val);
        showResult(r);
      }

      // ── Histórico ────────────────────────────────────────────────────
      const scanHistory = [];

      function addToHistory(result) {
        const now = new Date();
        const time = now.toTimeString().substring(0, 8);

        let statusClass, icon, statusText, detail;
        if (result.status === "valid") {
          statusClass = "valid"; icon = "✅";
          statusText = "ACESSO AUTORIZADO";
          detail = result.entry.name + " — " + result.data;
        } else if (result.status === "invalid") {
          statusClass = "invalid"; icon = "❌";
          statusText = "ASSINATURA INVÁLIDA";
          detail = "ID: " + result.certId + " — " + (result.data || "");
        } else if (result.status === "unknown") {
          statusClass = "warn"; icon = "⚠️";
          statusText = "EMISSOR DESCONHECIDO";
          detail = "ID '" + result.certId + "' fora do TrustStore";
        } else {
          statusClass = "warn"; icon = "⚠️";
          statusText = "QR INVÁLIDO";
          detail = "Formato não reconhecido";
        }

        scanHistory.unshift({ statusClass, icon, statusText, detail, time, result });

        // Atualiza contador e mostra tab bar
        document.getElementById("hist-count").textContent = scanHistory.length;
        document.getElementById("tab-bar").style.display = "flex";

        renderHistory();
      }

      function renderHistory() {
        const list = document.getElementById("history-list");
        if (scanHistory.length === 0) {
          list.innerHTML = '<div class="history-empty"><div class="history-empty-icon">📋</div><span>Nenhum scan realizado</span></div>';
          return;
        }
        list.innerHTML = scanHistory.map((item, i) => `
          <div class="history-item" onclick="showHistoryDetail(${i})">
            <div class="history-badge ${item.statusClass}">${item.icon}</div>
            <div class="history-info">
              <div class="history-status ${item.statusClass}">${item.statusText}</div>
              <div class="history-detail">${item.detail}</div>
            </div>
            <div class="history-time">${item.time}</div>
          </div>
        `).join("");
      }

      function showHistoryDetail(i) {
        const item = scanHistory[i];
        showTab("scan");
        document.getElementById("scanner-screen").style.display = "none";
        document.getElementById("result-screen").style.display = "flex";
        showResult(item.result);
      }

      function clearHistory() {
        scanHistory.length = 0;
        document.getElementById("hist-count").textContent = "0";
        document.getElementById("tab-bar").style.display = "none";
        renderHistory();
        showTab("scan");
      }

      function showTab(tab) {
        const scannerScreen = document.getElementById("scanner-screen");
        const resultScreen = document.getElementById("result-screen");
        const historyScreen = document.getElementById("history-screen");
        const tabScan = document.getElementById("tab-scan");
        const tabHist = document.getElementById("tab-hist");

        if (tab === "scan") {
          historyScreen.style.display = "none";
          tabHist.classList.remove("active");
          tabScan.classList.add("active");
          // Mostra scanner ou resultado, dependendo do estado atual
          if (resultScreen.style.display === "flex") {
            resultScreen.style.display = "flex";
            scannerScreen.style.display = "none";
          } else {
            scannerScreen.style.display = "flex";
            resultScreen.style.display = "none";
          }
        } else {
          scannerScreen.style.display = "none";
          resultScreen.style.display = "none";
          historyScreen.style.display = "flex";
          tabHist.classList.add("active");
          tabScan.classList.remove("active");
        }
      }

      startScanner();
    </script>
  </body>
</html>
